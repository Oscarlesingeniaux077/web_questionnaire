<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tableau Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    table {
      margin: 0 auto 30px auto;
      border-collapse: collapse;
      width: 80%;
      background-color: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }

    th {
      background-color: #007BFF;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .info {
      font-size: 22px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #007BFF;
      color: white;
      margin: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .delete-btn {
      background-color: #dc3545;
    }

    .delete-btn:hover {
      background-color: #a71d2a;
    }
  </style>
</head>
<body>

  <h1>Liste des comptes clients</h1>

  <div class="info" id="nombreComptes">Nombre total de comptes : 0</div>

  <table>
    <thead>
      <tr>
        <th>N°</th>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Âge</th>
        <th>Adresse mail</th>
        <th>Mot de passe</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>

  <button onclick="window.location.href='accueiladmin.html'">Retour</button>

  <script>
    async function afficherComptes() {
      const tableBody = document.getElementById("tableBody");
      const nombreComptes = document.getElementById("nombreComptes");

      tableBody.innerHTML = "<tr><td colspan='7'>Chargement...</td></tr>";

      try {
        const response = await fetch("get_comptes.php");
        const comptes = await response.json();

        tableBody.innerHTML = "";

        if (comptes.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="7">Aucun compte enregistré</td>
            </tr>
          `;
        } else {
          comptes.forEach(function(compte, index) {
            const ligne = document.createElement("tr");

            ligne.innerHTML = `
              <td>${index + 1}</td>
              <td>${compte.nom}</td>
              <td>${compte.prenom}</td>
              <td>${compte.age}</td>
              <td>${compte.email}</td>
              <td>${compte.password}</td>
              <td>
                <button class="delete-btn" onclick="supprimerCompte(${index})">
                  Supprimer
                </button>
              </td>
            `;

            tableBody.appendChild(ligne);
          });
        }

        nombreComptes.textContent = "Nombre total de comptes : " + comptes.length;

      } catch (error) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="7">Erreur de chargement des données</td>
          </tr>
        `;
        console.error(error);
      }
    }

    async function supprimerCompte(index) {
      if (!confirm("Voulez-vous vraiment supprimer ce compte ?")) {
        return;
      }

      try {
        const response = await fetch("delete_compte.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ index: index })
        });

        const result = await response.json();

        if (result.success) {
          afficherComptes();
        } else {
          alert("Erreur : " + result.message);
        }
      } catch (error) {
        console.error(error);
        alert("Erreur lors de la suppression.");
      }
    }

    afficherComptes();
  </script>

</body>
</html>
