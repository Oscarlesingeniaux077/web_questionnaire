<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Administration Comptes</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:30px;
text-align:center;
}

h1{font-size:42px;}

table{
margin:auto;
width:95%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:12px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.info{
font-size:22px;
margin:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#007BFF;
color:white;
margin:4px;
}

button:hover{background:#0056b3;}

.delete-btn{background:#dc3545;}
.delete-btn:hover{background:#a71d2a;}

#detailCompte{
display:none;
margin:30px auto;
width:90%;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:left;
overflow-x:auto;
}

#detailCompte h2{
text-align:center;
color:#007BFF;
}

.reponses{
background:#eef5ff;
padding:20px;
margin-top:20px;
border-radius:10px;
}

input, textarea{
padding:8px;
font-size:16px;
}

textarea{
resize:vertical;
}
</style>
</head>

<body>

<h1>Liste des comptes clients</h1>

<div class="info" id="nombreComptes">
Nombre total de comptes : 0
</div>

<table>
<thead>
<tr>
<th>N°</th>
<th>Nom</th>
<th>Prénom</th>
<th>Âge</th>
<th>Email</th>
<th>Mot de passe</th>
<th>Consulter</th>
<th>Noter</th>
<th>Supprimer</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<br>

<button onclick="window.location.href='accueiladmin.html'">
Retour
</button>

<div id="detailCompte"></div>

<script>
function afficherComptes(){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];
let tableBody = document.getElementById("tableBody");
let nombre = document.getElementById("nombreComptes");

tableBody.innerHTML = "";

if(comptes.length === 0){

tableBody.innerHTML = `
<tr>
<td colspan="9">Aucun compte enregistré</td>
</tr>
`;

} else {

comptes.forEach(function(compte,index){

let ligne = document.createElement("tr");

ligne.innerHTML = `
<td>${index + 1}</td>
<td>${compte.nom || ""}</td>
<td>${compte.prenom || ""}</td>
<td>${compte.age || ""}</td>
<td>${compte.email || ""}</td>
<td>${compte.password || ""}</td>

<td>
<button onclick="consulterCompte(${index})">
Consulter
</button>
</td>

<td>
<button onclick="noterCompte(${index})">
Noter
</button>
</td>

<td>
<button class="delete-btn" onclick="supprimerCompte(${index})">
Supprimer
</button>
</td>
`;

tableBody.appendChild(ligne);

});

}

nombre.textContent = "Nombre total de comptes : " + comptes.length;

}

function supprimerCompte(index){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];

comptes.splice(index,1);

localStorage.setItem("comptes", JSON.stringify(comptes));

document.getElementById("detailCompte").style.display = "none";

afficherComptes();

}

function consulterCompte(index){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];
let compte = comptes[index];
let bloc = document.getElementById("detailCompte");

let html = `
<h2>Consultation du compte</h2>

<p><strong>Nom :</strong> ${compte.nom || ""}</p>
<p><strong>Prénom :</strong> ${compte.prenom || ""}</p>
<p><strong>Âge :</strong> ${compte.age || ""}</p>
<p><strong>Email :</strong> ${compte.email || ""}</p>
<p><strong>Mot de passe :</strong> ${compte.password || ""}</p>

<h3>Notes, appréciations et corrigés</h3>
`;

for(let p = 2; p <= 6; p++){

html += `
<div class="reponses">
<h3>Parcours ${p}</h3>
<p><strong>Note :</strong> ${compte["noteParcours" + p] || "Aucune note"} /20</p>
<p><strong>Appréciation :</strong> ${compte["appreciationParcours" + p] || "Aucune appréciation"}</p>
<p><strong>Corrigé :</strong> ${compte["corrigeParcours" + p + "Nom"] || "Aucun corrigé ajouté"}</p>
</div>
`;

}

html += `
<br>

<div class="reponses">
<h3>Toutes les réponses enregistrées</h3>
`;

if(compte.reponses && compte.reponses.length > 0){

compte.reponses.forEach(function(r,i){

html += `
<p>
<strong>Réponse ${i + 1} :</strong> ${r}
</p>
`;

});

} else {

html += `
<p>Aucune réponse enregistrée dans le compte.</p>
`;

}

html += `
</div>

<br>

<button onclick="consulterReponsesParcours2()">
Voir les réponses du Parcours 2
</button>

<button onclick="
document.getElementById('detailCompte').style.display='none'
">
Fermer
</button>
`;

bloc.innerHTML = html;
bloc.style.display = "block";

window.scrollTo({
top: document.body.scrollHeight,
behavior: "smooth"
});

}

function consulterReponsesParcours2(){

const pages = ["P2_Page2.html", "P2_Page3.html", "P2_Page4.html"];
let bloc = document.getElementById("detailCompte");

let html = `
<h2>Réponses enregistrées - Parcours 2</h2>
`;

pages.forEach(function(page){

const donnees = JSON.parse(localStorage.getItem(page)) || {};

html += `
<div class="reponses">
<h3>${page}</h3>
<p><strong>Réponse :</strong> ${donnees.reponse || "Aucune réponse enregistrée"}</p>
</div>
`;

});

html += `
<br>
<button onclick="
document.getElementById('detailCompte').style.display='none'
">
Fermer
</button>
`;

bloc.innerHTML = html;
bloc.style.display = "block";

}

function noterCompte(index){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];
let compte = comptes[index];
let bloc = document.getElementById("detailCompte");

let html = `
<h2>Notation des parcours</h2>

<table style="width:100%; border-collapse:collapse; margin-top:20px;">
<tr>
<th>Parcours</th>
<th>Note /20</th>
<th>Appréciation</th>
<th>Corrigé</th>
<th>Retirer corrigé</th>
</tr>
`;

for(let p = 2; p <= 6; p++){

let note = compte["noteParcours" + p] || "";
let appreciation = compte["appreciationParcours" + p] || "";
let corrigeNom = compte["corrigeParcours" + p + "Nom"] || "";

html += `
<tr>
<td>Parcours ${p}</td>

<td>
<input type="number" id="noteParcours${p}" value="${note}" min="0" max="20">
</td>

<td>
<textarea id="appreciationParcours${p}" rows="4" style="width:95%;">${appreciation}</textarea>
</td>

<td>
<input type="file" id="corrigeParcours${p}">
<br><br>
<span id="nomCorrigeParcours${p}">
${corrigeNom ? "Fichier actuel : " + corrigeNom : "Aucun corrigé ajouté"}
</span>
</td>

<td>
<button class="delete-btn" onclick="retirerCorrige(${index}, ${p})">
Retirer
</button>
</td>
</tr>
`;

}

html += `
</table>

<br><br>

<button onclick="enregistrerNotes(${index})">
Enregistrer
</button>

<button onclick="
document.getElementById('detailCompte').style.display='none'
">
Fermer
</button>
`;

bloc.innerHTML = html;
bloc.style.display = "block";

window.scrollTo({
top: document.body.scrollHeight,
behavior: "smooth"
});

}

function enregistrerNotes(index){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];

for(let p = 2; p <= 6; p++){

let note = document.getElementById("noteParcours" + p).value;
let appreciation = document.getElementById("appreciationParcours" + p).value;
let fichier = document.getElementById("corrigeParcours" + p).files[0];

comptes[index]["noteParcours" + p] = note;
comptes[index]["appreciationParcours" + p] = appreciation;

if(fichier){
comptes[index]["corrigeParcours" + p + "Nom"] = fichier.name;
}

}

localStorage.setItem("comptes", JSON.stringify(comptes));

alert("Notes, appréciations et corrigés enregistrés.");

afficherComptes();

document.getElementById("detailCompte").style.display = "none";

}

function retirerCorrige(index, parcours){

let comptes = JSON.parse(localStorage.getItem("comptes")) || [];

delete comptes[index]["corrigeParcours" + parcours + "Nom"];

localStorage.setItem("comptes", JSON.stringify(comptes));

alert("Corrigé retiré du parcours " + parcours + ".");

noterCompte(index);

}

afficherComptes();
</script>

</body>
</html>
