<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Interface Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background-color: #007BFF;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }

    .logout {
      background-color: #dc3545;
    }

    .logout:hover {
      background-color: #a71d2a;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>ADMIN</h1>

    <!-- Accès tableau clients -->
    <button onclick="window.location.href='Tableau_Admin.html'">
      Client
    </button>

    <br>

    <!-- Déconnexion -->
    <button class="logout" onclick="logout()">
      Déconnexion
    </button>
  </div>

  <script>
    function logout() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
