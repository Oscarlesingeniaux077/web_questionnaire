<DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page3</title>
  </head>
  <body>
    
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
    }

    .question {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
    }

    .message {
      margin-top: 20px;
      color: green;
      font-weight: bold;
    }
    .fraction {
  display: inline-block;
  text-align: center;
}

.fraction .top {
  display: block;
  border-bottom: 1px solid black;
}

.fraction .bottom {
  display: block;
}
  </style>
</head>
<body>

  <h1>Page 3</h1>

  <div class="question">
    <label for="reponse"><span class="top">-2,7</span>
    <span class="bottom">-0,14</span>
  </span>

  <span class="operation">×</span>

  <span class="fraction">
    <span class="top">21</span>
    <span class="bottom">-45</span>
  </span></label>
    <textarea id="reponse"></textarea>
  </div>

  <button onclick="enregistrerReponse()">Enregistrer</button>
  <button onclick="chargerReponse()">Recharger la réponse</button>

  <p id="message" class="message"></p>

  <script>
    const pageId = "page3";

    function enregistrerReponse() {
      const reponse = document.getElementById("reponse").value.trim();

      localStorage.setItem(pageId, JSON.stringify({
        reponse: reponse
      }));

      document.getElementById("message").textContent = "Réponse enregistrée.";
    }

    function chargerReponse() {
      const donnees = localStorage.getItem(pageId);

      if (!donnees) {
        document.getElementById("message").textContent = "Aucune réponse enregistrée.";
        return;
      }

      const objet = JSON.parse(donnees);
      document.getElementById("reponse").value = objet.reponse || "";
      document.getElementById("message").textContent = "Réponse rechargée.";
    }

    window.onload = chargerReponse;
  </script>

</body>
</html>
</body>
</html>
