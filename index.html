<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion avec rôles</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .box {
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    .admin {
      background: #ffdddd;
    }

    .user {
      background: #ddffdd;
    }
  </style>
</head>
<body>

  <!-- PAGE LOGIN -->
  <div id="loginPage" class="container">
    <h2>Connexion</h2>
    <input type="text" id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- INTERFACE ADMIN -->
  <div id="adminPage" class="hidden box admin">
    <!-- <h2>Interface Administrateur</h2>
    <p>Bienvenue Admin</p>
    <button>Gérer les utilisateurs</button>
    <button>Voir les statistiques</button>
    <br><br>
    <button onclick="logout()">Déconnexion</button> -->
    <a href:"#"></a>
  </div>

  <!-- INTERFACE UTILISATEUR -->
  <div id="userPage" class="hidden box user">
    <!-- <h2>Interface Utilisateur</h2>
    <p>Bienvenue Utilisateur</p>
    <button>Voir mon profil</button>
    <button>Mes données</button>
    <br><br>
    <button onclick="logout()">Déconnexion</button> -->
        <a href:"Menu.html"></a>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");

      // Comptes simulés
      if (username === "admin077@gmail.com" && password === "admin123426") {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
        error.textContent = "";
      }
      else if (username === "Oscar077@gmail.com" && password === "01092012") {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("userPage").classList.remove("hidden");
        error.textContent = "";
      }
      else {
        error.textContent = "Identifiants incorrects";
      }
    }

    function logout() {
      document.getElementById("adminPage").classList.add("hidden");
      document.getElementById("userPage").classList.add("hidden");
      document.getElementById("loginPage").classList.remove("hidden");
    }
  </script>

</body>
</html>
