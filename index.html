<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion avec rôles</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- PAGE LOGIN -->
  <div id="loginPage" class="container">
    <h2>Connexion</h2>
    <input type="text" id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <p id="error" style="color:red;"></p>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");

      // Comptes simulés
      if (username === "admin077@gmail.com" && password === "admin123426") {
        window.location.href = "#"; // redirection admin
      }
      else if (username === "Oscar077@gmail.com" && password === "01092012") {
        window.location.href = "Menu.html"; // redirection utilisateur
      }
      else {
        error.textContent = "Identifiants incorrects";
      }
    }
  </script>

</body>
</html>
