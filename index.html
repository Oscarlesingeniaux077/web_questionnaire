<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion avec rôles</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      margin-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>
<body>

  <h2>Connexion</h2>

  <input type="text" id="username" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <button onclick="window.location.href='Creataccount.html'">
    Créer un compte
  </button>

  <p id="error" style="color:red;"></p>

 <script>
  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    error.textContent = "";

    // Compte administrateur fixe
    if (username === "admin077@gmail.com" && password === "admin123426") {
      localStorage.setItem("utilisateurConnecte", JSON.stringify({
        nom: "Admin",
        prenom: "",
        email: username,
        role: "admin"
      }));

      window.location.href = "accueiladmin.html";
      return;
    }

    // Comptes créés
    const comptes = JSON.parse(localStorage.getItem("comptes")) || [];

    const utilisateurTrouve = comptes.find(function(compte) {
      return compte.email === username && compte.password === password;
    });

    if (utilisateurTrouve) {
      localStorage.setItem("utilisateurConnecte", JSON.stringify({
        nom: utilisateurTrouve.nom,
        prenom: utilisateurTrouve.prenom,
        age: utilisateurTrouve.age,
        email: utilisateurTrouve.email,
        role: "client"
      }));

      window.location.href = "Menu.html";
    } else {
      error.textContent = "Identifiants incorrects";
    }
  }
</script>

</body>
</html>
