<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un compte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 50px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    p {
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Créer un compte</h1>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">
    <input type="number" id="age" placeholder="Âge">
    <input type="email" id="email" placeholder="Adresse mail">
    <input type="password" id="password" placeholder="Mot de passe">

    <button onclick="creerCompte()">Valider</button>

    <p id="message"></p>
  </div>

  <script>
    async function creerCompte() {
      const nom = document.getElementById("nom").value.trim();
      const prenom = document.getElementById("prenom").value.trim();
      const age = document.getElementById("age").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      message.textContent = "";
      message.style.color = "red";

      if (nom === "" || prenom === "" || age === "" || email === "" || password === "") {
        message.textContent = "Veuillez remplir tous les champs.";
        return;
      }

      if (parseInt(age) <= 0) {
        message.textContent = "Veuillez saisir un âge valide.";
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        message.textContent = "Veuillez saisir une adresse mail valide.";
        return;
      }

      const nouveauCompte = {
        nom: nom,
        prenom: prenom,
        age: age,
        email: email,
        password: password
      };

      try {
        const response = await fetch("save_compte.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(nouveauCompte)
        });

        const result = await response.json();

        if (result.success) {
          message.style.color = "green";
          message.textContent = "Compte créé avec succès.";

          setTimeout(function() {
            window.location.href = "index.html";
          }, 1000);
        } else {
          message.style.color = "red";
          message.textContent = result.message || "Erreur lors de la création du compte.";
        }
      } catch (error) {
        console.error(error);
        message.style.color = "red";
        message.textContent = "Erreur de connexion au serveur.";
      }
    }
  </script>

</body>
</html>
