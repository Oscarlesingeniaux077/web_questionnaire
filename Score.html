<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(0deg, #e0ecff, #6B8E23);
  padding:30px;
  box-sizing:border-box;
}

h1{
  text-align:center;
  font-size:40px;
  color:#1f1f1f;
}

.card{
  max-width:1000px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.info{
  text-align:center;
  font-size:22px;
  margin-bottom:25px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ccc;
  padding:14px;
  text-align:center;
  font-size:18px;
}

th{
  background:#007BFF;
  color:white;
}

tr:nth-child(even){
  background:#f2f2f2;
}

.btn{
  display:block;
  width:max-content;
  margin:30px auto 0;
  padding:12px 24px;
  background:#007BFF;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

.btn:hover{
  background:#0056b3;
}

.message{
  text-align:center;
  color:#c62828;
  font-size:20px;
  font-weight:bold;
}

.appreciation{
  text-align:left;
  white-space:pre-wrap;
}

.lien-corrige{
  display:inline-block;
  margin:4px;
  padding:8px 12px;
  background:#007BFF;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-size:15px;
}

.lien-corrige:hover{
  background:#0056b3;
}

.download{
  background:#28a745;
}

.download:hover{
  background:#1e7e34;
}
</style>
</head>

<body>

<h1>Mes scores</h1>

<div class="card">
  <div class="info" id="infoUtilisateur"></div>

  <table>
    <thead>
      <tr>
        <th>Parcours attribué</th>
        <th>Note</th>
        <th>Appréciation</th>
        <th>Corrigé</th>
      </tr>
    </thead>

    <tbody id="scoreBody"></tbody>
  </table>

  <a href="Menu.html" class="btn">Retour au menu</a>
</div>

<script>
const utilisateurConnecte = JSON.parse(localStorage.getItem("utilisateurConnecte"));
const comptes = JSON.parse(localStorage.getItem("comptes")) || [];

const infoUtilisateur = document.getElementById("infoUtilisateur");
const scoreBody = document.getElementById("scoreBody");

if (!utilisateurConnecte) {

  window.location.href = "index.html";

} else {

  infoUtilisateur.textContent =
    (utilisateurConnecte.prenom || "") + " " + (utilisateurConnecte.nom || "");

  const compte = comptes.find(function(c) {
    return c.email === utilisateurConnecte.email;
  });

  if (!compte) {

    scoreBody.innerHTML = `
      <tr>
        <td colspan="4" class="message">
          Aucun compte trouvé.
        </td>
      </tr>
    `;

  } else {

    let html = "";

    for (let p = 2; p <= 6; p++) {

      let note = compte["noteParcours" + p];
      let appreciation = compte["appreciationParcours" + p];
      let corrige = compte["corrigeParcours" + p + "Nom"];

      let affichageCorrige = "Aucun corrigé";

      if (corrige) {

        let urlCorrige = "corriges/" + corrige;

        affichageCorrige = `
          <a class="lien-corrige" href="${urlCorrige}" target="_blank">
            Ouvrir
          </a>

          <a class="lien-corrige download" href="${urlCorrige}" download>
            Télécharger
          </a>
        `;
      }

      html += `
        <tr>
          <td>Parcours ${p}</td>
          <td>${note ? note + " /20" : "Non noté"}</td>
          <td class="appreciation">${appreciation ? appreciation : "Aucune appréciation"}</td>
          <td>${affichageCorrige}</td>
        </tr>
      `;
    }

    scoreBody.innerHTML = html;
  }
}
</script>

</body>
</html>
